<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba HTML</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background: #f4f4f4;
    }

    h1 {
      color: #333;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      background: #007BFF;
      color: white;
      cursor: pointer;
      border-radius: 8px;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <h1>Hola, Nes</h1>
  <p>Esto es una prueba simple en HTML.</p>

  <button onclick="saludar()">Haz clic</button>

  <script>
    function saludar() {
      alert("Funciona perfectamente 😎");
    }
  </script>

</body>
</html>
